x-pet-base: &pet-base
  build: .
  environment:
    CLAUDE_PET_ROOT: /app
    IS_SANDBOX: "1"
  init: true
  restart: unless-stopped
  cap_drop:
    - NET_RAW
    - NET_ADMIN
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        memory: 2g
        cpus: "1.5"

services:
  coboonge:
    <<: *pet-base
    env_file: .env.coboonge
    volumes:
      - ./config/coboonge:/app/config/coboonge:ro
      - coboonge-data:/app/data/coboonge
      - coboonge-workspace:/workspace
      - shared-tasks:/app/data/shared/tasks
      - shared-status:/app/data/shared/status
      - shared-knowledge:/app/data/shared/knowledge-feed
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/root/.claude
      - ${HOME}/.config/gh:/root/.config/gh
    command: ["--pet", "coboonge"]

  reboong:
    <<: *pet-base
    env_file: .env.reboong
    volumes:
      - ./config/reboong:/app/config/reboong:ro
      - reboong-data:/app/data/reboong
      - reboong-workspace:/workspace
      - shared-tasks:/app/data/shared/tasks
      - shared-status:/app/data/shared/status
      - shared-knowledge:/app/data/shared/knowledge-feed
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/root/.claude
      - ${HOME}/.config/gh:/root/.config/gh
      - ${HOME}/.codex:/root/.codex
    command: ["--pet", "reboong"]

  shuboong:
    <<: *pet-base
    env_file: .env.shuboong
    volumes:
      - ./config/shuboong:/app/config/shuboong:ro
      - shuboong-data:/app/data/shuboong
      - shuboong-workspace:/workspace
      - shared-tasks:/app/data/shared/tasks
      - shared-status:/app/data/shared/status
      - shared-knowledge:/app/data/shared/knowledge-feed
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/root/.claude
      - ${HOME}/.config/gh:/root/.config/gh
    command: ["--pet", "shuboong"]

  boongboong:
    <<: *pet-base
    env_file: .env.boongboong
    volumes:
      - ./config/boongboong:/app/config/boongboong:ro
      - boongboong-data:/app/data/boongboong
      - boongboong-workspace:/workspace
      - shared-tasks:/app/data/shared/tasks
      - shared-status:/app/data/shared/status
      - shared-knowledge:/app/data/shared/knowledge-feed
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/root/.claude
      - ${HOME}/.config/gh:/root/.config/gh
    command: ["--pet", "boongboong"]

  opboong:
    <<: *pet-base
    env_file: .env.opboong
    volumes:
      - ./config/opboong:/app/config/opboong:ro
      - opboong-data:/app/data/opboong
      - opboong-workspace:/workspace
      - shared-tasks:/app/data/shared/tasks
      - shared-status:/app/data/shared/status
      - shared-knowledge:/app/data/shared/knowledge-feed
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/root/.claude
      - ${HOME}/.config/gh:/root/.config/gh
    command: ["--pet", "opboong"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      DASHBOARD_PORT: "3000"
      SHARED_STATUS_DIR: /app/data/shared/status
      PET_DATA_DIRS: /app/data/coboonge,/app/data/reboong,/app/data/shuboong,/app/data/opboong,/app/data/boongboong
      PET_CONFIG_DIRS: /app/config/coboonge,/app/config/reboong,/app/config/shuboong,/app/config/opboong,/app/config/boongboong
    volumes:
      - coboonge-data:/app/data/coboonge:ro
      - reboong-data:/app/data/reboong:ro
      - shuboong-data:/app/data/shuboong:ro
      - opboong-data:/app/data/opboong:ro
      - boongboong-data:/app/data/boongboong:ro
      - shared-status:/app/data/shared/status:ro
      - ./config/coboonge:/app/config/coboonge:ro
      - ./config/reboong:/app/config/reboong:ro
      - ./config/shuboong:/app/config/shuboong:ro
      - ./config/opboong:/app/config/opboong:ro
      - ./config/boongboong:/app/config/boongboong:ro
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  coboonge-data:
  coboonge-workspace:
  reboong-data:
  reboong-workspace:
  shared-tasks:
  shared-status:
  shuboong-data:
  shuboong-workspace:
  boongboong-data:
  boongboong-workspace:
  opboong-data:
  opboong-workspace:
  shared-knowledge:
