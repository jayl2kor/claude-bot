x-pet-base: &pet-base
  build: .
  environment:
    CLAUDE_PET_ROOT: /app
  init: true
  restart: unless-stopped
  cap_drop:
    - NET_RAW
    - NET_ADMIN
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        memory: 2g
        cpus: "1.5"

services:
  coboonge:
    <<: *pet-base
    env_file: .env.coboonge
    volumes:
      - ./config/coboonge:/app/config/coboonge:ro
      - coboonge-data:/app/data/coboonge
      - shared-tasks:/app/data/shared/tasks
      - ${WORKSPACE_PATH:-.}:/workspace
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/home/node/.claude:ro
    command: ["--pet", "coboonge"]

  reboong:
    <<: *pet-base
    env_file: .env.reboong
    volumes:
      - ./config/reboong:/app/config/reboong:ro
      - reboong-data:/app/data/reboong
      - shared-tasks:/app/data/shared/tasks
      - ${WORKSPACE_PATH:-.}:/workspace
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/home/node/.claude:ro
    command: ["--pet", "reboong"]

volumes:
  coboonge-data:
  reboong-data:
  shared-tasks:
