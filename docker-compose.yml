x-pet-base: &pet-base
  build: .
  environment:
    CLAUDE_PET_ROOT: /app
    IS_SANDBOX: "1"
  init: true
  restart: unless-stopped
  cap_drop:
    - NET_RAW
    - NET_ADMIN
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        memory: 2g
        cpus: "1.5"

services:
  coboonge:
    <<: *pet-base
    env_file: .env.coboonge
    volumes:
      - ./config/coboonge:/app/config/coboonge:ro
      - coboonge-data:/app/data/coboonge
      - coboonge-workspace:/workspace
      - shared-tasks:/app/data/shared/tasks
      - shared-status:/app/data/shared/status
      - shared-knowledge:/app/data/shared/knowledge-feed
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/root/.claude
    command: ["--pet", "coboonge"]

  reboong:
    <<: *pet-base
    env_file: .env.reboong
    volumes:
      - ./config/reboong:/app/config/reboong:ro
      - reboong-data:/app/data/reboong
      - reboong-workspace:/workspace
      - shared-tasks:/app/data/shared/tasks
      - shared-status:/app/data/shared/status
      - shared-knowledge:/app/data/shared/knowledge-feed
      - ${CLAUDE_AUTH_PATH:-${HOME}/.claude}:/root/.claude
    command: ["--pet", "reboong"]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      DASHBOARD_PORT: "3000"
      SHARED_STATUS_DIR: /app/data/shared/status
      PET_DATA_DIRS: /app/data/coboonge,/app/data/reboong
      PET_CONFIG_DIRS: /app/config/coboonge,/app/config/reboong
    volumes:
      - coboonge-data:/app/data/coboonge:ro
      - reboong-data:/app/data/reboong:ro
      - shared-status:/app/data/shared/status:ro
      - ./config/coboonge:/app/config/coboonge:ro
      - ./config/reboong:/app/config/reboong:ro
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  coboonge-data:
  coboonge-workspace:
  reboong-data:
  reboong-workspace:
  shared-tasks:
  shared-status:
  shared-knowledge:
